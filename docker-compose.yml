version: '3.9'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sellin:sellin@postgres:5432/sellin
    AIRFLOW__WEBSERVER__SECRET_KEY: sellin_airflow_secret_key_2026
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    PYTHONPATH: /opt/airflow/project
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: sellin
    POSTGRES_USER: sellin
    POSTGRES_PASSWORD: sellin
    MINIO_ENDPOINT: minio:9000
    MINIO_ROOT_USER: minioadmin
    MINIO_ROOT_PASSWORD: minioadmin123
    MINIO_RAW_BUCKET: raw
    MINIO_PROCESSED_BUCKET: processed
    MINIO_ERROR_BUCKET: erro
    PIPELINE_STATUS_TABLE: pipeline_runs
    TOP_N_PDVS: 10
  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipeline:/opt/airflow/project/pipeline
    - ./tests:/opt/airflow/project/tests
    - ./data:/opt/airflow/project/data
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: sellin-postgres
    environment:
      POSTGRES_USER: sellin
      POSTGRES_PASSWORD: sellin
      POSTGRES_DB: sellin
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sellin -d sellin']
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: sellin-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: sellin-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb -p local/raw || true &&
      mc mb -p local/processed || true &&
      mc mb -p local/erro || true &&
      mc anonymous set none local/raw || true &&
      mc anonymous set none local/processed || true &&
      mc anonymous set none local/erro || true &&
      mc cp /seed/qro_sellin_filtered_5000.csv local/raw/qro_sellin_filtered_5000.csv || true
      "
    volumes:
      - ./data/raw:/seed

  airflow-init:
    <<: *airflow-common
    container_name: sellin-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    container_name: sellin-airflow-webserver
    command: webserver
    ports:
      - '8080:8080'
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: sellin-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:11.1.0
    container_name: sellin-grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  grafana_data:
